name: CI Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Node
        uses: actions/checkout@v4
    
      - name: Setup Node
        uses: actions/setup-node@v4   
        with: 
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: run lint
        run: npm run lint  

      - name: run test
        run: npm run test    
 


      

    